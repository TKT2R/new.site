<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
    <title>TKT2Rocket | Agência de Gestão para Criadoras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
    <script defer="defer" src="/static/js/main.5b366446.js"></script>
    <link href="/static/css/main.333bd661.css" rel="stylesheet">
</head>
<body>
    <div id="root"></div>
    <script>
    (function() {
        const translations = [
            // HERO - TÍTULO E SUBTÍTULO
            ["Do Exibicionismo ao Lucro:", "Quer vender (...e muito) como criadora de conteúdo adulto?"],
            ["Transforme suas fotos e vídeos em dinheiro de verdade", "Mas, não tem ideia como?"],
            
            // A LINHA DO HERÓI QUE PRECISA DE QUEBRA DE LINHA
            // Esta substituição foca no trecho curto e injeta o texto completo com o <br>
            ["A TKT2Rocket gerencia seu perfil", "A TKT2ROCKET 🚀 sabe como te ajudar para voar alto. <br><br> Uma agência completa para te ajudar a ter liberdade de criação e produção e vender muito mais no Privacy, HotVips e OnlyFans para você vender conteúdo com segurança e sigilo."],
            
            // LIMPEZA DE TEXTOS RESIDUAIS (PARA NÃO SOBRAR FRASES ABAIXO)
            ["no Privacy, HotVips e OnlyFans para você vender conteúdo com segurança e sigilo, ganhar mais e ter liberdade para crescer.", ""],
            ["ganhar mais e ter liberdade para crescer.", ""],

            // OUTRAS DOBRAS
            ["Aquilo que começou como uma brincadeira", "DO EXIBICIONISMO AO LUCRO: Aquilo que começou como uma brincadeira pode pagar muito mais que a balada!"],
            ["Seus vídeos sobem, mas seus assinantes não", "SEUS VÍDEOS SOBEM, MAS SEUS ASSINANTES NÃO?"],
            ["Somos sócios do seu crescimento", "Você sabe que seus vídeos são bons, mas tem poucos assinantes e não sabe como crescer?"],
            ["O que oferecemos", "UMA PARCERIA REAL"],
            ["Quem Somos", "QUEM SOMOS?"],
            ["Gerenciamos perfis e cuidamos de toda a estratégia", "Agência há 3 anos no mercado, destaque no nicho hotwife/cuckold. Hoje gerenciamos cerca de 30 criadoras."],
            ["Pague a TKT2ROCKET somente com o que trouxermos de Crescimento", "Pague a TKT2ROCKET somente com o que trouxermos de crescimento. Sua receita média é garantida."]
        ];

        function walk(node) {
            if (node.nodeType === 3) { // Node de texto
                let text = node.nodeValue;
                translations.forEach(([old, newVal]) => {
                    if (text.includes(old)) {
                        // Se houver tag <br>, usamos innerHTML no pai para renderizar a quebra de linha
                        if (newVal.includes('<br>')) {
                            node.parentNode.innerHTML = node.parentNode.innerHTML.replace(old, newVal);
                        } else {
                            // Senão, substituição de texto puro (mais segura contra conflitos)
                            node.nodeValue = text.replace(old, newVal);
                        }
                    }
                });
            }
            for (let i = 0; i < node.childNodes.length; i++) {
                walk(node.childNodes[i]);
            }
        }

        const observer = new MutationObserver(() => walk(document.body));
        observer.observe(document.body, { childList: true, subtree: true });
    })();
    </script>
</body>
</html>
