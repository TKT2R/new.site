<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
    <title>TKT2Rocket | Agência de Gestão para Criadoras</title>
    <link href="/static/css/main.333bd661.css" rel="stylesheet">
    <script defer="defer" src="/static/js/main.5b366446.js"></script>
    <style>
        .plus-yellow { color: #ffcc00 !important; font-weight: bold; }
        .stats-value { color: #ff3b3b !important; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // Função simples de troca
        function fix() {
            const root = document.getElementById('root');
            if(!root) return;
            
            let html = root.innerHTML;
            if (html.includes("Do Exibicionismo ao Lucro") && !html.includes("Quer vender")) {
                html = html.replace("Do Exibicionismo ao Lucro:", "Quer vender (...e muito) como criadora de conteúdo adulto?");
                html = html.replace("+25", "<span class='plus-yellow'>+</span> Faturamento");
                html = html.replace("Top 1", "<span class='plus-yellow'>+</span> Assinantes");
                root.innerHTML = html;
            }
        }

        // Tenta trocar apenas 3 vezes, com intervalos longos, para não travar o processador
        setTimeout(fix, 3000);
        setTimeout(fix, 6000);
        setTimeout(fix, 9000);
    </script>
</body>
</html>
