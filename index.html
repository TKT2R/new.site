<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
    <title>TKT2Rocket | Agência de Gestão para Criadoras</title>
    <link href="/static/css/main.333bd661.css" rel="stylesheet">
    <script defer="defer" src="/static/js/main.5b366446.js"></script>
    <style>
        .plus-yellow { color: #ffcc00 !important; font-weight: bold; margin-right: 4px; }
        .stats-value { color: #ff3b3b !important; font-weight: bold; }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <script>
        window.addEventListener('load', function() {
            // Espera 3 segundos para garantir que o React terminou de renderizar tudo
            setTimeout(function() {
                const root = document.getElementById('root');
                if (!root) return;

                let content = root.innerHTML;

                // --- TROCAS DO HERO ---
                content = content.replace("Do Exibicionismo ao Lucro:", "Quer vender (...e muito) como criadora de conteúdo adulto?");
                content = content.replace("Transforme suas fotos e vídeos em dinheiro de verdade", "Mas, não tem ideia como?");
                
                // --- TROCAS DE IMPACTO ---
                content = content.replace("Como Funciona a Parceria", "DO EXIBICIONISMO AO LUCRO");
                
                // --- TROCAS DOS NÚMEROS (COM O + AMARELO) ---
                content = content.replace("+25", "<span class='plus-yellow'>+</span> Faturamento");
                content = content.replace("Top 1", "<span class='plus-yellow'>+</span> Assinantes");
                content = content.replace("CRIADORAS GERENCIADAS", "CRESCIMENTO MÉDIO");
                content = content.replace("RANKING DO PRIVACY", "CRESCIMENTO NO 1º MÊS");

                root.innerHTML = content;
                console.log("Traduções aplicadas com sucesso.");
            }, 3000);
        });
    </script>
</body>
</html>
