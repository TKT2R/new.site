<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
    <title>TKT2Rocket | Agência de Gestão para Criadoras</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
    <script defer="defer" src="/static/js/main.5b366446.js"></script>
    <link href="/static/css/main.333bd661.css" rel="stylesheet">
    <style>
        #root h1 { font-family: 'Playfair Display', serif !important; font-weight: 800 !important; }
        .hero-sub { font-family: 'Manrope', sans-serif !important; line-height: 1.6; display: block; margin-top: 15px; }
        .stats-label { font-size: 0.75rem !important; text-transform: uppercase !important; color: #999 !important; display: block; }
        .stats-value { font-family: 'Playfair Display', serif !important; color: #ff3b3b !important; font-size: 1.5rem !important; font-weight: 700 !important; display: block; }
        .plus-yellow { color: #ffcc00 !important; font-weight: 800; margin-right: 4px; }
        
        /* Design dos Boxes - Forçado via CSS */
        .tkt-box-content { pointer-events: none; }
        .box-number { color: #c5a059 !important; font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 700; display: block; line-height: 1; }
        .box-title { font-family: 'Playfair Display', serif !important; color: #fff !important; font-size: 1.4rem !important; font-weight: 700; display: block; margin-top: 10px; line-height: 1.2; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
    (function() {
        const translations = [
            ["Do Exibicionismo ao Lucro:", "Quer vender (...e muito) como criadora de conteúdo adulto?"],
            ["Transforme suas fotos e vídeos em dinheiro de verdade", "Mas, não tem ideia como?"],
            ["A TKT2Rocket gerencia seu perfil", "<span class='hero-sub'>A TKT2ROCKET 🚀 sabe como te ajudar para voar alto. <br><br> Uma agência completa para te ajudar a ter liberdade de criação e produção e vender muito mais no Privacy, HotVips e OnlyFans.</span>"],
            ["Como Funciona a Parceria", "DO EXIBICIONISMO AO LUCRO"],
            ["Somos sócios do seu crescimento", "Somos sócios do seu crescimento. <br> Só crescemos se você crescer."],
            ["Aquilo que começou como uma brincadeira pode pagar muito mais", "Aquilo que começou como uma brincadeira pode pagar muito mais que a balada do final de semana!!!"]
        ];

        const boxes = {
            "01": "Estratégia de Divulgação",
            "02": "Plataformas e Consultoria",
            "03": "Marketing e Gestão"
        };

        const stats = {
            "+25": { val: "Faturamento", lab: "CRESCIMENTO MÉDIO" },
            "Top 1": { val: "Assinantes", lab: "CRESCIMENTO NO 1º MÊS" },
            "Oficial": { val: "Alcance Global", lab: "PÓS-TKT2ROCKET" }
        };

        function apply() {
            const root = document.getElementById('root');
            if (!root) return;

            // 1. Traduções Simples (Hero e Impacto)
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
            let node;
            while(node = walker.nextNode()) {
                let text = node.nodeValue.trim();
                translations.forEach(([old, newVal]) => {
                    if (text.includes(old) && !node.parentNode.innerHTML.includes('hero-sub')) {
                        const span = document.createElement('span');
                        span.innerHTML = newVal;
                        node.parentNode.replaceChild(span, node);
                    }
                });
            }

            // 2. Injeção nos Boxes (Garante que o texto apareça sem eco)
            Object.keys(boxes).forEach(num => {
                const elements = Array.from(document.querySelectorAll('p, span, h3')).filter(el => el.textContent.trim() === num);
                elements.forEach(el => {
                    if (!el.parentNode.querySelector('.tkt-box-content')) {
                        el.style.display = 'none'; // Esconde o original
                        const div = document.createElement('div');
                        div.className = 'tkt-box-content';
                        div.innerHTML = `<span class='box-number'>${num}</span><span class='box-title'>${boxes[num]}</span>`;
                        el.parentNode.appendChild(div);
                    }
                });
            });

            // 3. Injeção nas Estatísticas
            Object.keys(stats).forEach(key => {
                const elements = Array.from(document.querySelectorAll('p, span')).filter(el => el.textContent.trim() === key);
                elements.forEach(el => {
                    if (!el.parentNode.querySelector('.stats-value')) {
                        el.style.display = 'none';
                        const div = document.createElement('div');
                        div.innerHTML = `<span class='stats-value'><span class='plus-yellow'>+</span> ${stats[key].val}</span><span class='stats-label'>${stats[key].lab}</span>`;
                        el.parentNode.appendChild(div);
                    }
                });
            });
        }

        setInterval(apply, 2000);
        window.addEventListener('load', apply);
    })();
    </script>
</body>
</html>
