<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
    <title>TKT2Rocket | Agência de Gestão para Criadoras</title>
    <link href="/static/css/main.333bd661.css" rel="stylesheet">
    <script defer="defer" src="/static/js/main.5b366446.js"></script>
    <style>
        /* Apenas CSS para as cores, sem scripts para não travar */
        .plus-yellow { color: #ffcc00 !important; font-weight: bold; }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <script>
        // Este script só roda DEPOIS que tudo estiver carregado e parado
        window.addEventListener('load', function() {
            console.log('Site carregado. Iniciando troca única.');
            setTimeout(function() {
                const el = document.getElementById('root');
                if (el) {
                    el.innerHTML = el.innerHTML
                        .replace(/Do Exibicionismo ao Lucro:/g, "Quer vender (...e muito) como criadora de conteúdo adulto?")
                        .replace(/\+25/g, "<span class='plus-yellow'>+</span> Faturamento")
                        .replace(/Top 1/g, "<span class='plus-yellow'>+</span> Assinantes");
                }
            }, 5000); // Espera 5 segundos inteiros antes de tocar no código
        });
    </script>
</body>
</html>
